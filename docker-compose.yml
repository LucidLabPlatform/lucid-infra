services:
  lucid-db:
    build: ../lucid-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lucid}
      POSTGRES_USER: ${POSTGRES_USER:-lucid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-REDACTED}
    volumes:
      - lucid_db_data:/var/lib/postgresql/data

  lucid-auth:
    build: ../lucid-auth
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      EMQX_URL: http://emqx:18083
      EMQX_USERNAME: ${EMQX_API_USERNAME:-lucid}
      EMQX_PASSWORD: ${EMQX_API_PASSWORD:-lucid}
      BOOTSTRAP_CC_USER: ${LUCID_MQTT_USERNAME:-central-command}
      BOOTSTRAP_CC_PASSWORD: ${LUCID_MQTT_PASSWORD:-REDACTED}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      emqx:
        condition: service_started

  emqx:
    build: ../lucid-emqx
    restart: unless-stopped
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: emqx
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_API_USERNAME:-lucid}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_API_PASSWORD:-lucid}
      EMQX_ALLOW_ANONYMOUS: "false"
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__2__MECHANISM: password_based
      EMQX_AUTHENTICATION__2__BACKEND: ldap
      EMQX_AUTHENTICATION__2__METHOD__TYPE: bind
      EMQX_AUTHENTICATION__2__METHOD__BIND_PASSWORD: $${password}
      EMQX_AUTHENTICATION__2__SERVER: '"${LDAP_SERVER:-}"'
      EMQX_AUTHENTICATION__2__USERNAME: '"${LDAP_BIND_USERNAME:-}"'
      EMQX_AUTHENTICATION__2__PASSWORD: '"${LDAP_BIND_PASSWORD:-}"'
      EMQX_AUTHENTICATION__2__BASE_DN: '"${LDAP_BASE_DN:-}"'
      EMQX_AUTHENTICATION__2__FILTER: '"${LDAP_FILTER:-(&(objectClass=inetOrgPerson)(uid=$${username}))}"'
      EMQX_AUTHENTICATION__2__QUERY_TIMEOUT: 5s
      EMQX_AUTHORIZATION__NO_MATCH: deny
      EMQX_AUTHORIZATION__SOURCES__1__TYPE: built_in_database
      EMQX_AUTHORIZATION__SOURCES__1__ENABLE: "true"
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "8883:8883"
      - "18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data

  lucid-fleet-core:
    build: ../lucid-fleet-core
    restart: unless-stopped
    environment:
      LUCID_MQTT_HOST: emqx
      LUCID_MQTT_PORT: "1883"
      LUCID_MQTT_USERNAME: ${LUCID_MQTT_USERNAME:-central-command}
      LUCID_MQTT_PASSWORD: ${LUCID_MQTT_PASSWORD:-REDACTED}
      LUCID_DB_URL: postgresql://${POSTGRES_USER:-lucid}:${POSTGRES_PASSWORD:-REDACTED}@lucid-db:5432/${POSTGRES_DB:-lucid}
      EMQX_API_URL: http://emqx:18083/api/v5
      EMQX_API_USERNAME: ${EMQX_API_USERNAME:-lucid}
      EMQX_API_PASSWORD: ${EMQX_API_PASSWORD:-lucid}
    depends_on:
      - lucid-db
      - emqx
      - lucid-auth

  lucid-automation:
    build: ../lucid-automation
    restart: unless-stopped
    environment:
      LUCID_DB_URL: postgresql://${POSTGRES_USER:-lucid}:${POSTGRES_PASSWORD:-REDACTED}@lucid-db:5432/${POSTGRES_DB:-lucid}
      LUCID_FLEET_CORE_URL: http://lucid-fleet-core:5000
      EMQX_API_URL: http://emqx:18083/api/v5
      EMQX_API_USERNAME: ${EMQX_API_USERNAME:-lucid}
      EMQX_API_PASSWORD: ${EMQX_API_PASSWORD:-lucid}
    depends_on:
      - lucid-db
      - lucid-fleet-core
      - emqx

  lucid-ai:
    build: ../lucid-ai
    restart: unless-stopped
    environment:
      LUCID_DB_URL: postgresql://${POSTGRES_USER:-lucid}:${POSTGRES_PASSWORD:-REDACTED}@lucid-db:5432/${POSTGRES_DB:-lucid}
      LUCID_FLEET_CORE_URL: http://lucid-fleet-core:5000
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
    depends_on:
      - lucid-db
      - lucid-fleet-core
      - ollama

  lucid-ui:
    build: ../lucid-ui
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLEET_CORE_URL: http://lucid-fleet-core:5000
      AUTOMATION_URL: http://lucid-automation:5000
      AI_URL: http://lucid-ai:5000
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-lucid}
      SESSION_SECRET: ${SESSION_SECRET:-REDACTED}
    depends_on:
      - lucid-fleet-core
      - lucid-automation
      - lucid-ai

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  emqx-provisioner:
    build:
      context: ../lucid-emqx
      dockerfile: Provisioner.Dockerfile
    restart: on-failure
    environment:
      EMQX_URL: http://emqx:18083
      EMQX_USERNAME: ${EMQX_API_USERNAME:-lucid}
      EMQX_PASSWORD: ${EMQX_API_PASSWORD:-REDACTED}
      LUCID_FLEET_CORE_URL: http://lucid-fleet-core:5000
    depends_on:
      - emqx
      - lucid-fleet-core

volumes:
  lucid_db_data:
    name: lucid-db-data
  emqx_data:
    name: emqx-data
  ollama_data:
