apiVersion: 1

datasources:
  - name: LUCID Postgres
    type: postgres
    uid: lucid-postgres
    url: lucid-db:5432
    user: ${GF_DATASOURCE_PG_USER}
    secureJsonData:
      password: ${GF_DATASOURCE_PG_PASSWORD}
    jsonData:
      database: ${GF_DATASOURCE_PG_DATABASE}
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 10
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: true
    isDefault: true
    editable: false
