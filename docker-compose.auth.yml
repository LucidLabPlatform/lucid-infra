services:
  lucid-db:
    build: ../lucid-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lucid}
      POSTGRES_USER: ${POSTGRES_USER:-lucid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
    ports:
      - "5432:5432"
    volumes:
      - lucid_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lucid} -d ${POSTGRES_DB:-lucid}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  lucid-auth:
    build: ../lucid-auth
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      EMQX_URL: http://emqx:18083
      EMQX_USERNAME: ${EMQX_API_USERNAME:-lucid}
      EMQX_PASSWORD: ${EMQX_API_PASSWORD:-CHANGE_ME}
      BOOTSTRAP_CC_USER: ${LUCID_MQTT_USERNAME:-central-command}
      BOOTSTRAP_CC_PASSWORD: ${LUCID_MQTT_PASSWORD:-CHANGE_ME}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      emqx:
        condition: service_started

  emqx:
    build: ../lucid-emqx
    restart: unless-stopped
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: emqx
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_API_USERNAME:-lucid}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_API_PASSWORD:-CHANGE_ME}
      EMQX_ALLOW_ANONYMOUS: "false"
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__2__MECHANISM: password_based
      EMQX_AUTHENTICATION__2__BACKEND: ldap
      EMQX_AUTHENTICATION__2__METHOD__TYPE: bind
      EMQX_AUTHENTICATION__2__METHOD__BIND_PASSWORD: $${password}
      EMQX_AUTHENTICATION__2__SERVER: ${LDAP_SERVER:-}
      EMQX_AUTHENTICATION__2__USERNAME: ${LDAP_BIND_USERNAME:-}
      EMQX_AUTHENTICATION__2__PASSWORD: ${LDAP_BIND_PASSWORD:-}
      EMQX_AUTHENTICATION__2__BASE_DN: ${LDAP_BASE_DN:-}
      EMQX_AUTHENTICATION__2__FILTER: ${LDAP_FILTER:-(&(objectClass=inetOrgPerson)(uid=$${username}))}
      EMQX_AUTHENTICATION__2__QUERY_TIMEOUT: 5s
      EMQX_AUTHORIZATION__NO_MATCH: deny
      EMQX_AUTHORIZATION__SOURCES__1__TYPE: built_in_database
      EMQX_AUTHORIZATION__SOURCES__1__ENABLE: "true"
    ports:
      - "1883:1883"
      - "18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data

  emqx-provisioner:
    build:
      context: ../lucid-emqx
      dockerfile: Provisioner.Dockerfile
    restart: on-failure
    environment:
      EMQX_URL: http://emqx:18083
      EMQX_USERNAME: ${EMQX_API_USERNAME:-lucid}
      EMQX_PASSWORD: ${EMQX_API_PASSWORD:-CHANGE_ME}
      LUCID_DB_HOST: lucid-db:5432
      LUCID_DB_NAME: ${POSTGRES_DB:-lucid}
      LUCID_DB_USER: ${POSTGRES_USER:-lucid}
      LUCID_DB_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
    depends_on:
      lucid-db:
        condition: service_healthy
      emqx:
        condition: service_started

volumes:
  lucid_db_data:
    name: lucid-db-data
  emqx_data:
    name: emqx-data
