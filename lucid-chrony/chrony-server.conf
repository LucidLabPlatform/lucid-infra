# Chrony NTP server for LUCID edge devices.
# Syncs upstream to public NTP pools, serves time to LAN agents.

# Upstream NTP sources
pool pool.ntp.org iburst maxsources 4

# Allow all clients on the local network
allow 0.0.0.0/0

# If upstream is unreachable, serve local time at stratum 10
local stratum 10

# Step clock if offset > 1s during first 3 updates
makestep 1.0 3

# Log
logdir /var/log/chrony
